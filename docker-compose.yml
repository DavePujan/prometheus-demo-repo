version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: demo-monitor-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: monitor-demo
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 5s
      timeout: 10s
      retries: 5

  redis:
    image: redis:latest
    container_name: demo-monitor-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 10s
      retries: 5

volumes:
  mongodb_data:
  redis_data:
